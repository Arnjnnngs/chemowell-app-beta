<body>
<div id="root"></div>

<script type="module">

// ---------- On-device storage — no cloud, no accounts ----------
// All data lives in this device's localStorage. Nothing is ever sent to a server.
const TEST_MODE = true; // APP BETA — enables the date-override controls for testing
const ENTRIES_KEY = 'chemowell-app-entries-v1';
const PREFS_KEY = 'chemowell-app-prefs-v1';

function loadJSON(key, fallback) {
  try { const raw = localStorage.getItem(key); return raw ? JSON.parse(raw) : fallback; }
  catch (e) { return fallback; }
}
function saveJSON(key, value) { localStorage.setItem(key, JSON.stringify(value)); }

let entriesListener = null;
let prefsListener = null;

function allEntriesRaw() { return loadJSON(ENTRIES_KEY, []); }

function notifyEntries() {
  if (!entriesListener) return;
  const all = allEntriesRaw().slice().sort((a, b) => a.ts - b.ts);
  state.chemoDates = all.filter(e => e.medId === 'chemo_date');
  entriesListener(all.filter(e => e.medId !== 'chemo_date'));
}

function subscribeEntries(callback) {
  entriesListener = callback;
  notifyEntries();
  return () => { entriesListener = null; };
}

async function addEntryDB(entry) {
  const all = allEntriesRaw();
  const id = 'e' + Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
  all.push({ id: id, ...entry });
  saveJSON(ENTRIES_KEY, all);
  notifyEntries();
}

async function removeEntryDB(id) {
  saveJSON(ENTRIES_KEY, allEntriesRaw().filter(e => e.id !== id));
  notifyEntries();
}

function getPrefsDB() { return loadJSON(PREFS_KEY, {}); }
function subscribePrefs(callback) {
  prefsListener = callback;
  callback(getPrefsDB());
  return () => { prefsListener = null; };
}
async function setPrefsDB(patch) {
  const next = { ...getPrefsDB(), ...patch };
  saveJSON(PREFS_KEY, next);
  if (prefsListener) prefsListener(next);
}

// Keep two open tabs on the same device in sync.
window.addEventListener('storage', (ev) => {
  if (ev.key === ENTRIES_KEY) notifyEntries();
  if (ev.key === PREFS_KEY && prefsListener) prefsListener(getPrefsDB());
});

// Native local notifications arrive with the Capacitor build; nothing to register here.
async function subscribePush() {}

function missKey(e) { return e.medId + '|' + e.ts; }

// Per-row alternative to the banner's bulk "Clear": dismiss just this one missed window without
// logging a dose or creating any record. Stored as a list of "medId|ts" keys in prefs.
async function dismissMissedDose(e) {
  try {
    const next = (state.dismissedMisses || []).concat([missKey(e)]);
    await setPrefsDB({ dismissedMisses: next });
    setToast('Dismissed');
  } catch (err) {
    setToast('Could not save');
  }
}

// Per-row "Skipped": writes a real (permanent) entry marking this window as intentionally not
// given, rather than just hiding it. missedDosesFor() treats a skipped:true entry the same as a
// real dose for coverage purposes.
async function skipMissedDose(e) {
  await addEntryDB({ medId: e.medId, dose: null, mg: 0, ts: e.ts, skipped: true });
  setToast(nameOf(e.medId) + ' marked as skipped for ' + e.windowName + ' window');
}

async function clearMissedDoses() {
  const ts = state.now;
  try {
    await setPrefsDB({ missedClearedAt: ts });
    setToast('Missed doses cleared');
  } catch (e) {
    setToast('Could not save');
  }
}

// ---------- React via htm + preact-like approach using vanilla ----------
// Using a minimal reactive approach with vanilla JS for zero build step

const DEFAULT_MEDS = [
  { id:'dexamethasone', name:'Dexamethasone', sub:'Steroid · chemo premed', type:'win', alerts:true, chemoOnly:true, note:'2 tablets · 8 AM & 2 PM · day before chemo through day after',
    doses:[{label:'2 tablets',pills:2,mg:0}],
    windows:[{start:8,end:12,name:'Morning'},{start:14,end:18,name:'Afternoon'}] },
  { id:'tylenol', name:'Tylenol', sub:'Acetaminophen', type:'gap', gapH:4, ceiling:true, ceilingGroup:'tylenol', painScale:true, note:'Min 4-hour gap',
    doses:[{label:'500 mg',mg:500},{label:'1000 mg',mg:1000}] },
  { id:'tylenol-liquid', name:'Tylenol Liquid', sub:'Acetaminophen · Oral suspension', type:'gap', gapH:6, ceiling:true, ceilingGroup:'tylenol', volumeCeilingMl:90, volumePerDoseMl:30, painScale:true, note:'Min 6-hour gap · shares daily limit with Tylenol · max 90 mL/24h',
    doses:[{label:'30 mL (1000 mg)',mg:1000}] },
  { id:'zofran', name:'Zofran', sub:'Ondansetron', type:'gap', gapH:0, note:'As needed — no gap timer' },
  { id:'compazine', name:'Compazine', sub:'Prochlorperazine', type:'gap', gapH:6, note:'10 PM · earlier as needed · min 6h gap' },
  { id:'morphine', name:'Morphine', sub:'Immediate release', type:'gap', gapH:4, ceiling:true, ceilingMax:15, rollingCeilingH:4, note:'Up to 15 mg per rolling 4-hour window', painScale:true,
    doses:[{label:'½ tab · 7.5 mg',mg:7.5},{label:'Full · 15 mg',mg:15}] },
  { id:'lidocaine', name:'Lidocaine', sub:'Topical cream', type:'gap', gapH:4, ceiling:true, ceilingMax:4, ceilingUnit:'applications', note:'Min 4-hour gap · max 4 applications/day',
    doses:[{label:'Apply',pills:1,mg:0}] },
  { id:'protonix', name:'Protonix', sub:'Pantoprazole', type:'win', alerts:true, note:'Twice daily · 8 AM & 8 PM',
    windows:[{start:8,end:12,name:'Morning'},{start:20,end:22,name:'Evening'}] },
  { id:'buspirone', name:'Buspirone', sub:'BuSpar', type:'win', alerts:true, morningLinkedToProtonix:true, note:'Once daily · with Protonix',
    windows:[{start:10,end:24,name:'Morning'}] },
  { id:'paroxetine', name:'Paroxetine', sub:'Paxil', type:'win', alerts:true, morningLinkedToProtonix:true, note:'Once daily · with Protonix',
    windows:[{start:10,end:24,name:'Morning'}] },
  { id:'iron', name:'Iron', sub:'Ferrous sulfate', type:'win', alerts:true, eveningLinkedToProtonix:true, note:'Once daily · with Protonix',
    windows:[{start:22,end:24,name:'Night'}] },
  { id:'senokot', name:'Senokot', sub:'Senna', type:'gap', gapH:0, note:'As needed · 1–2 pills',
    doses:[{label:'1 pill',pills:1,mg:0},{label:'2 pills',pills:2,mg:0}] },
  { id:'imodium', name:'Imodium', sub:'Loperamide', type:'gap', gapH:0, ceiling:true, ceilingMax:4, ceilingUnit:'pills', note:'Max 4 pills per day',
    doses:[{label:'2 pills (onset)',pills:2,mg:0},{label:'1 pill',pills:1,mg:0}] },
];

// Medication configuration is intentionally browser-local for the testing app.
// Dose-entry history remains in on-device storage; configuration changes do not touch it.
const MED_CONFIG_STORAGE_KEY = 'chemowell-app-medication-config-v1';
const DEFAULT_QUICK_LOG_IDS = ['dexamethasone', 'tylenol', 'tylenol-liquid', 'zofran', 'morphine', 'lidocaine', 'protonix', 'senokot', 'imodium'];
const DEFAULT_EVENING_IDS = ['iron', 'compazine'];
const DEFAULT_MORNING_IDS = ['buspirone', 'paroxetine'];

function deepCopyMeds(meds) {
  return meds.map(med => ({
    ...med,
    doses: Array.isArray(med.doses) ? med.doses.map(dose => ({ ...dose })) : undefined,
    windows: Array.isArray(med.windows) ? med.windows.map(window => ({ ...window })) : undefined
  }));
}

function safeMedicationId(value, fallback) {
  const cleaned = String(value || fallback || 'medication').toLowerCase().trim().replace(/[^a-z0-9]+/g, '-').replace(/^-+|-+$/g, '');
  return cleaned || 'medication';
}

function normalizeMedication(raw, index) {
  const original = raw || {};
  const id = safeMedicationId(original.id, original.name || ('medication-' + (index + 1)));
  const type = original.type === 'win' ? 'win' : 'gap';
  const doses = Array.isArray(original.doses) ? original.doses.filter(dose => dose && dose.label).map(dose => ({
    label: String(dose.label),
    mg: Number(dose.mg) || 0,
    ...(Number(dose.pills) ? { pills: Number(dose.pills) } : {})
  })) : undefined;
  const windows = Array.isArray(original.windows) ? original.windows.map((window, windowIndex) => ({
    start: Math.max(0, Math.min(23, Number(window.start) || 0)),
    end: Math.max(1, Math.min(24, Number(window.end) || 24)),
    name: String(window.name || ('Window ' + (windowIndex + 1)))
  })).filter(window => window.end > window.start) : [];
  const medication = {
    ...original,
    id,
    name: String(original.name || 'Untitled medication').trim(),
    sub: String(original.sub || '').trim(),
    type,
    gapH: type === 'gap' ? Math.max(0, Number(original.gapH) || 0) : 0,
    quickLog: typeof original.quickLog === 'boolean' ? original.quickLog : DEFAULT_QUICK_LOG_IDS.includes(id),
    groupedEvening: typeof original.groupedEvening === 'boolean' ? original.groupedEvening : DEFAULT_EVENING_IDS.includes(id),
    groupedMorning: typeof original.groupedMorning === 'boolean' ? original.groupedMorning : DEFAULT_MORNING_IDS.includes(id)
  };
  if (doses && doses.length) medication.doses = doses; else delete medication.doses;
  if (type === 'win') medication.windows = windows.length ? windows : [{ start: 0, end: 24, name: 'Daily' }]; else delete medication.windows;
  return medication;
}

function normalizeArchivedMeds(raw) {
  const archived = {};
  if (!raw || typeof raw !== 'object') return archived;
  Object.entries(raw).forEach(([id, value]) => {
    if (!value || typeof value !== 'object') return;
    archived[id] = { name: String(value.name || id), sub: String(value.sub || '') };
  });
  return archived;
}

function defaultMedicationConfig() {
  // APP: fresh installs start with an empty list — the first-run guide walks the user
  // through building their own. DEFAULT_MEDS is retained only for legacy migrations.
  return { meds: [], archivedMeds: {} };
}

// v37 one-shot migration: Senokot became plain as-needed with 1- or 2-pill options.
// Saved device configs still carrying the old windowed Senokot get the fresh default;
// fires only while the saved med is still type 'win', so later manual edits persist.
function migrateSenokotV37(med) {
  if (!med || med.id !== 'senokot' || med.type === 'gap') return med;
  return normalizeMedication(deepCopyMeds(DEFAULT_MEDS.filter(m => m.id === 'senokot'))[0]);
}

// A saved device config is a point-in-time snapshot of the FULL med list — it does not automatically
// pick up medications added to DEFAULT_MEDS after that snapshot was taken (e.g. Tylenol Liquid, added
// well after most devices had already saved a config from editing some other medication). Without this
// merge, a brand-new default medication would silently never appear on any device with an existing
// saved config, even though it renders fine on a fresh/no-saved-config session. Any DEFAULT_MEDS entry
// whose id isn't already present in the saved list AND isn't archived (deliberately deleted) gets
// appended, in DEFAULT_MEDS order at the end; existing customizations for meds already present are
// left untouched.
function mergeMissingDefaultMeds(meds, archivedMeds) {
  // APP: no auto-seeding of defaults — the user's list is entirely their own.
  return meds;
}

function loadMedicationConfig() {
  const fallback = defaultMedicationConfig();
  try {
    if (typeof localStorage === 'undefined') return fallback;
    const saved = JSON.parse(localStorage.getItem(MED_CONFIG_STORAGE_KEY));
    if (!saved || !Array.isArray(saved.meds) || !saved.meds.length) return fallback;
    const archivedMeds = normalizeArchivedMeds(saved.archivedMeds);
    const meds = mergeMissingDefaultMeds(saved.meds.map(normalizeMedication).map(migrateSenokotV37), archivedMeds);
    return { meds, archivedMeds };
  } catch (error) {
    console.warn('Medication configuration could not be loaded:', error);
    return fallback;
  }
}

function persistMedicationConfig(meds, archivedMeds) {
  try {
    if (typeof localStorage === 'undefined') return;
    localStorage.setItem(MED_CONFIG_STORAGE_KEY, JSON.stringify({ version: 1, meds, archivedMeds }));
  } catch (error) {
    console.warn('Medication configuration could not be saved:', error);
    setToast('Medication changes are active for this session but could not be saved on this device.');
  }
}

const CONFIG = { patientName: '', ceilingMg: 2500, tempUnit: 'Fahrenheit' };

// State
const initialMedicationConfig = loadMedicationConfig();
let state = { entries: [], chemoDates: [], now: Date.now(), toast: null, warn: null, demo: false, view: 'home', reportsView: null, meds: initialMedicationConfig.meds, archivedMeds: initialMedicationConfig.archivedMeds, medEditor: null, confirmDeleteMed: null, override: null, confirmRemove: null, tempInput: '', weightInput: '', chemoInput: '', weightRange: 'weeks', timeModal: null, loaded: false, dateOffsetDays: 0, testDateControlsOpen: false, missedClearedAt: 0, dismissedMisses: [], confirmClearChemo: false, chemoCalOpen: false, chemoCalCursor: null, historyMissedOnly: false, tourStep: null };
let toastTimer = null;
let unsub = null;
let unsubPrefs = null;
let pendingEntries = null;

function setState(patch) {
  Object.assign(state, patch);
  // Flush any deferred entry updates when the time modal closes
  if (!state.timeModal && pendingEntries) {
    state.entries = pendingEntries;
    pendingEntries = null;
  }
  render();
}

// Helpers
function dayStart(ts) { const d = new Date(ts); return new Date(d.getFullYear(), d.getMonth(), d.getDate()).getTime(); }

// ---- TESTING-ONLY date override ----
// Lets Aaron simulate a different "today" in this testing app so date-dependent features (chemo
// offsets, missed-dose windows, cycle day counter, in-patient ranges) can be exercised without
// waiting for real time to pass. Only ever active when TEST_MODE is true — simNow() falls back to
// real Date.now() whenever TEST_MODE is false, so this has zero effect if this code is ever
// promoted/copied into production with TEST_MODE = false.
function simNow() {
  if (!TEST_MODE) return Date.now();
  return Date.now() + (state.dateOffsetDays || 0) * 86400000;
}
function setSimDate(dateStr) {
  if (!TEST_MODE || !dateStr) return;
  const p = dateStr.split('-').map(Number);
  const picked = dayStart(new Date(p[0], p[1] - 1, p[2]).getTime());
  const realToday = dayStart(Date.now());
  state.dateOffsetDays = Math.round((picked - realToday) / 86400000); // set first so simNow() below sees it
  setState({ now: simNow() });
}
function shiftSimDate(days) {
  if (!TEST_MODE) return;
  state.dateOffsetDays = (state.dateOffsetDays || 0) + days; // set first so simNow() below sees it
  setState({ now: simNow() });
}
function resetSimDate() {
  if (!TEST_MODE) return;
  state.dateOffsetDays = 0; // set first so simNow() below sees it
  setState({ now: simNow() });
}
function entriesFor(id) { return state.entries.filter(e => e.medId === id); }
function latest(id) { const es = entriesFor(id); return es.length ? es.reduce((a, b) => a.ts > b.ts ? a : b) : null; }
function tempSuffix() { return CONFIG.tempUnit === 'Celsius' ? '°C' : '°F'; }
function tempFever() { return CONFIG.tempUnit === 'Celsius' ? 38.0 : 100.4; }
function tempHigh() { return CONFIG.tempUnit === 'Celsius' ? 39.4 : 103; }
function tylenolMg() {
  const med = state.meds.find(m => m.id === 'tylenol');
  return med && med.ceilingGroup ? dailyGroupMg(med) : dailyDoseMg('tylenol');
}
function dailyPills(medId) { const c = dayStart(state.now); return entriesFor(medId).filter(e => e.ts >= c).reduce((s, e) => s + (e.pills || 0), 0); }
function isEarlyAt(med, ts) {
  if (med.type === 'gap') {
    if (!med.gapH) return false;
    const prev = entriesFor(med.id).filter(e => e.ts < ts).sort((a, b) => a.ts - b.ts).pop();
    return !!prev && ts < prev.ts + med.gapH * 3600000;
  }
  const d0 = dayStart(ts);
  return ts < d0 + med.windows[0].start * 3600000;
}
function usedRecently(id) { return entriesFor(id).some(e => e.ts >= state.now - 7 * 86400000); }
function dailyDoseMg(medId) { const c = dayStart(state.now); return entriesFor(medId).filter(e => e.ts >= c).reduce((sum, entry) => sum + (entry.mg || 0), 0); }
// Rolling-window mg sum (e.g. Morphine's 15 mg per any trailing 4 hours) — unlike dailyDoseMg this
// does NOT reset at midnight; it only counts doses within windowH hours of `now`, so a dose "ages
// out" and frees up room exactly windowH hours after it was taken, regardless of the clock date.
function rollingDoseMg(medId, windowH, now) { const c = now - windowH * 3600000; return entriesFor(medId).filter(e => e.ts > c && e.ts <= now).reduce((sum, entry) => sum + (entry.mg || 0), 0); }
// For a rolling-window mg ceiling, once it's hit, find the earliest future timestamp at which
// enough of the currently-counted doses will have aged out of the window to leave room for at
// least the smallest configured dose again (e.g. after one 15mg dose, or two 7.5mg half-doses,
// this returns when the oldest dose(s) roll off enough to allow another half dose).
function rollingCeilingAvailableAt(med) {
  const windowH = med.rollingCeilingH;
  const windowMs = windowH * 3600000;
  const max = medicationCeilingMax(med);
  const doseMgs = (med.doses || []).map(d => d.mg || 0).filter(mg => mg > 0);
  const roomNeeded = doseMgs.length ? Math.min(...doseMgs) : 0;
  const now = state.now;
  const inWindow = entriesFor(med.id).filter(e => e.ts > now - windowMs).sort((a, b) => a.ts - b.ts);
  let used = inWindow.reduce((sum, e) => sum + (e.mg || 0), 0);
  for (const e of inWindow) {
    used -= (e.mg || 0);
    if (max - used >= roomNeeded) return e.ts + windowMs;
  }
  return now;
}
// Meds sharing a ceilingGroup (e.g. Tylenol pills + Tylenol Liquid) count against ONE combined
// daily mg ceiling, since it's the same acetaminophen safety limit regardless of dosage form.
function ceilingGroupMedIds(med) {
  if (!med) return [];
  if (!med.ceilingGroup) return [med.id];
  return state.meds.filter(m => m.ceilingGroup === med.ceilingGroup).map(m => m.id);
}
function dailyGroupMg(med) { return ceilingGroupMedIds(med).reduce((sum, id) => sum + dailyDoseMg(id), 0); }
// A separate, form-specific volume cap (e.g. Tylenol Liquid's 90 mL/24h) — independent of and in
// addition to the shared mg ceiling above, since it's the liquid form's own labeled dosing limit.
function dailyVolumeMl(medId) { const c = dayStart(state.now); return entriesFor(medId).filter(e => e.ts >= c).reduce((sum, entry) => sum + (entry.volumeMl || 0), 0); }
function dailyVolumeCeiling(med) {
  if (!med || !med.volumeCeilingMl) return null;
  return { used: dailyVolumeMl(med.id), max: med.volumeCeilingMl, unit: 'mL', label: med.volumeCeilingMl + ' mL' };
}
function medicationCeilingMax(med) {
  if (!med || !med.ceiling) return null;
  const configured = Number(med.ceilingMax);
  if (configured > 0) return configured;
  if (med.id === 'tylenol' || med.ceilingGroup === 'tylenol') return CONFIG.ceilingMg;
  return null;
}
function dailyCeiling(med) {
  if (!med || !med.ceiling) return null;
  const max = medicationCeilingMax(med);
  if (!max) return null;
  if (med.ceilingUnit) return { used: dailyPills(med.id), max, unit: med.ceilingUnit, label: max + ' ' + med.ceilingUnit };
  const used = med.rollingCeilingH ? rollingDoseMg(med.id, med.rollingCeilingH, state.now) : (med.ceilingGroup ? dailyGroupMg(med) : dailyDoseMg(med.id));
  const label = max.toLocaleString() + ' mg' + (med.rollingCeilingH ? (' / ' + med.rollingCeilingH + 'h') : '');
  return { used, max, unit: 'mg', label };
}
// Missed-dose detection. A window counts as covered by any dose logged that day
// before the window closed (and after the previous window closed) — so early logs
// like a 7:45 AM Protonix still cover the 8 AM window. Only meds with alerts:true.
// ---- Chemo cycle ----
// The next chemo date is the most recently logged 'chemo_date' record (append-only,
// so rescheduling just logs a new record; ts 0 means cleared).
function nextChemoTs() {
  if (!state.chemoDates.length) return null;
  const latest = state.chemoDates.reduce((a, b) => (((a.loggedAt || 0) > (b.loggedAt || 0)) ? a : b));
  return latest.ts > 0 ? latest.ts : null;
}
function chemoOffsetFor(dayTs) {
  const c = nextChemoTs();
  if (c === null) return null;
  return Math.round((dayStart(dayTs) - dayStart(c)) / 86400000);
}
function dexActiveOn(dayTs) { const o = chemoOffsetFor(dayTs); return o !== null && o >= -1 && o <= 1; }
// Zofran is blocked for 3 days: chemo day itself plus the 2 days after (e.g. chemo Thursday ->
// blocked Thu/Fri/Sat, opens Sunday). Confirmed by Aaron as the original, correct spec — v61/v62
// of this file incorrectly "fixed" this to a 2-day block based on stale documentation elsewhere in
// this repo; reverted in v67. See BETA_README.md's v67 changelog entry.
function zofranBlockedOn(dayTs) { const o = chemoOffsetFor(dayTs); return o !== null && o >= 0 && o <= 2; }
function dexWindowsForOffset(offset) { return offset === 1 ? [{ start: 8, end: 12, name: 'Morning' }] : [{ start: 8, end: 12, name: 'Morning' }, { start: 14, end: 18, name: 'Afternoon' }]; }

// Missed-dose tracking starts the day the app was first opened on this device — a fresh
// install must never flag "missed" doses for days before the app existed. installedAt is
// stamped into prefs on first run (see storage init below).
let MISSED_TRACK_SINCE = Date.now();
function missedDosesFor(dayTs, now) {
  const d0 = dayStart(dayTs);
  if (d0 < dayStart(MISSED_TRACK_SINCE)) return [];
  if (isInpatientDay(d0)) return []; // meds given by hospital staff that day — not tracked here
  const out = [];
  state.meds.filter(m => m.alerts && m.windows).forEach(med => {
    if (med.chemoOnly && !dexActiveOn(d0)) return;
    const windows = med.id === 'dexamethasone' ? dexWindowsForOffset(chemoOffsetFor(d0)) : med.windows;
    const dayEntries = entriesFor(med.id).filter(e => e.ts >= d0 && e.ts < d0 + 86400000).sort((a, b) => a.ts - b.ts);
    const used = new Set();
    const wins = windows.map((w, i) => ({ w,
      ws: d0 + w.start * 3600000, we: d0 + w.end * 3600000,
      nextStart: i + 1 < windows.length ? d0 + windows[i + 1].start * 3600000 : d0 + 86400000,
      covered: false }));
    // Single pass, processed in window order: each window gets first claim (before later windows
    // are considered) over any unused same-day dose logged before this window's cutoff (i.e. any
    // time up to just before the next window opens) -- covering doses given early, on time, or
    // late. Processing strictly in window order prevents a later window from "stealing" a dose that
    // legitimately belongs to an earlier window's late-catch-up range: e.g. a single Dexamethasone
    // dose given at 1pm, between the 8am and 2pm windows, must credit the 8am window it was late
    // for, not get grabbed by the 2pm window just because 1pm also happens to be before 2pm's close.
    // (Fixed in v68 -- found via Aaron's report that a late-logged dose could still show as missed.)
    wins.forEach(win => {
      const hit = dayEntries.find(e => !used.has(e) && e.ts < win.nextStart);

    }

    if (!m.symptomType) { setToast('Select a symptom first'); return; }
    if (m.symptomType === 'other' && !(m.note || '').trim()) { setToast('Describe the symptom before saving'); return; }

  }

function cyclePeriods() {
  // Pairs cycle_start/cycle_end chronologically into periods; the most recent period has end:null
  // if it's still active. Returned most-recent-first for display.
  //
  // A second cycle_start logged while one is already open (no cycle_end between them — e.g. a
  // double-tap, or correcting an accidental Start via the "+" log-for-another-day control) does
  // NOT start a second period. It updates the still-open period's start time instead. This keeps
  // this list consistent with cycleActive()/daysSinceCycleStart(), which already treat only the
  // single latest event as authoritative — without this, the earlier open period would be
  // orphaned and stuck showing as "Active" in history forever, even after a real Period End is
  // later logged against the newer start. Found live during the 30-use-case QA pass (UC20): two
  // back-to-back Period Starts around 7/14 left a permanently un-closeable "7/14/2026 – Active"
  // duplicate in Cycle History.
  const events = cycleEntries();
  const periods = [];
  let cur = null;
  events.forEach(e => {
    if (e.medId === 'cycle_start') {

      else { cur = { start: e.ts, end: null }; periods.push(cur); }
    }
    else if (e.medId === 'cycle_end' && cur && cur.end === null) { cur.end = e.ts; }

}

function h(tag, attrs, ...children) {
  const el = document.createElement(tag);
  if (attrs) {
    for (const [k, v] of Object.entries(attrs)) {
      if (k === 'style' && typeof v === 'object') {
        Object.assign(el.style, v);
      } else if (k.startsWith('on') && typeof v === 'function') {
        el.addEventListener(k.slice(2).toLowerCase(), v);
      } else if (k === 'innerHTML') {
        el.innerHTML = v;
      } else if (k === 'className') {
        el.className = v;
      } else {
        el.setAttribute(k, v);
      }
    }
  }
  for (const child of children.flat(Infinity)) {
    if (child == null || child === false) continue;
    el.appendChild(typeof child === 'string' || typeof child === 'number' ? document.createTextNode(String(child)) : child);
  }
  return el;
}

let tourLastPositionedStep = null;

  el.style.outline = '3px solid #E0679A';

// Weight, Cycle markers, Bowel Movement, and Symptoms entries aren't part of the medication
// dosing safety chain the 48h lock protects, so they stay editable/removable indefinitely
// (data-entry corrections only). Symptoms use a medId prefix (symptom_nausea, etc.) rather than
// a fixed id, so those are matched separately below instead of being listed in this set.
const BYPASS_48H_IDS = new Set(['weight', 'cycle_start', 'cycle_end', 'bowel_movement', 'appetite']);
function bypasses48h(medId) { return BYPASS_48H_IDS.has(medId) || (medId && medId.indexOf('symptom_') === 0); }
function removeBtn(e) {
  if (!bypasses48h(e.medId) && state.now - e.ts > 48 * 3600000) return null; // entries older than 48h are permanent history
  if (state.confirmRemove === e.id) {
    return h('div', { style: { display: 'flex', gap: '6px', alignItems: 'center', flexShrink: '0' } },
      h('button', { onClick: () => { setState({ confirmRemove: null }); removeEntry(e.id); }, style: { color: '#fff', background: '#C0453B', fontSize: '12.5px', fontWeight: '700', padding: '8px 12px', borderRadius: '9px' } }, 'Delete'),
      h('button', { onClick: () => setState({ confirmRemove: null }), style: { color: '#7D6974', fontSize: '12.5px', padding: '8px 6px', fontWeight: '600' } }, 'Keep')
    );
  }
  return h('button', { onClick: () => { setState({ confirmRemove: e.id }); setTimeout(() => { if (state.confirmRemove === e.id) setState({ confirmRemove: null }); }, 6000); }, style: { color: '#A15B56', fontSize: '12.5px', padding: '6px' } }, 'Remove');
}

function renderToday(now, mg, pct, tyColor, ceiling) {
  const parts = [];

    ));
  }

  // Today's Missed dose banner is scoped to TODAY only (v69) -- previously this walked every day
  // since MISSED_TRACK_SINCE and joined them into one ever-growing line, which meant an old unresolved

  // from earlier days are now surfaced separately via the pinned "previous days" card in the header

  const bannerItemsAll = missedDosesFor(dayStart(now), now).map(m => ({ ...m, when: 'Today' }));

    // previous-days card. Clear still just dismisses today's banner in place without navigating.
    parts.push(h('div', { onClick: goToHistoryTop, style: { background: 'rgba(192,69,59,0.16)', border: '2px solid #C0453B', borderRadius: '16px', padding: '15px 16px', display: 'flex', gap: '12px', alignItems: 'flex-start', boxShadow: '0 4px 24px rgba(192,69,59,0.25)', cursor: 'pointer' } },

function formatRuleSummary(med) {
  const fragments = [];
  if (med.rollingCeilingH) {
    // Rolling-window ceiling meds (e.g. Morphine) are governed by the cumulative-mg limit below,
    // not a flat per-dose gap — skip the "Min X-hour gap" fragment so it isn't shown alongside a
    // rule that no longer applies.
  } else if (med.type === 'gap') {
    fragments.push(med.gapH > 0 ? ('Min ' + med.gapH + '-hour gap') : 'As needed');
  } else if (med.windows && med.windows.length) {
    fragments.push(med.windows.map(window => window.name || (formatHour(window.start) + '–' + formatHour(window.end))).join(' · '));
  }
  if (med.ceiling) {
    const limit = medicationCeilingMax(med);
    if (limit) fragments.push((med.rollingCeilingH ? ('Up to ' + limit + ' ' + (med.ceilingUnit || 'mg') + ' per ' + med.rollingCeilingH + 'h') : ('Daily limit ' + limit + ' ' + (med.ceilingUnit || 'mg'))));
  }
  return fragments.join(' · ') || (med.note || 'No schedule rule set');
}

function formatHour(hour) {
  const h = Math.max(0, Math.min(24, Number(hour) || 0));
  if (h === 0 || h === 24) return h === 24 ? 'Midnight' : '12 AM';
  return (h > 12 ? h - 12 : h) + (h >= 12 ? ' PM' : ' AM');
}

function medicationDoseSummary(med) {
  return med.doses && med.doses.length ? med.doses.map(dose => dose.label).join(' · ') : 'Single-tap log';
}

function medicationFormFrom(med) {
  const base = med || {};
  const max = medicationCeilingMax(base);
  return {
    name: base.name || '',
    sub: base.sub || '',
    note: base.note || '',
    type: base.type === 'win' ? 'win' : 'gap',
    gapH: base.gapH || 0,
    dosesText: base.doses && base.doses.length ? base.doses.map(dose => dose.label).join(', ') : '',
    windowsText: base.windows && base.windows.length ? base.windows.map(window => formatHour(window.start) + '-' + formatHour(window.end) + ' ' + (window.name || '')).join(', ') : '8 AM-8 PM Daily',
    dailyLimit: max || '',
    dailyLimitUnit: base.ceilingUnit || 'mg',
    quickLog: typeof base.quickLog === 'boolean' ? base.quickLog : true,
    groupedEvening: !!base.groupedEvening,
    groupedMorning: !!base.groupedMorning,
    chemoOnly: !!base.chemoOnly
  };
}

function updateMedicationForm(field, value, rerender) {

function parseDoseOptions(text) {
  return String(text || '').split(',').map(value => value.trim()).filter(Boolean).map(label => {
    const mgMatch = label.match(/(\d+(?:\.\d+)?)\s*mg\b/i);
    const pillMatch = label.match(/(\d+(?:\.\d+)?)\s*(?:pill|tab|tablet|cap|capsule|application)/i);
    const dose = { label, mg: mgMatch ? Number(mgMatch[1]) : 0 };
    if (pillMatch) dose.pills = Number(pillMatch[1]);
    return dose;
  });
}

// v70: accepts 12-hour "8 AM-12 PM Morning" input (what the field now shows/expects) while still
// falling back to plain 24-hour digits ("8-12 Morning") for anyone/anything that types it that way
// -- Aaron shouldn't need to know military time to edit a schedule window.
function scheduleHourTo24(hourStr, ampm, isEnd) {
  let hr = Number(hourStr);
  const ap = (ampm || '').toLowerCase();
  if (ap === 'pm' && hr < 12) hr += 12;
  if (ap === 'am' && hr === 12) hr = isEnd ? 24 : 0;
  return hr;
}
function parseScheduleWindows(text) {
  const windows = [];
  String(text || '').split(',').map(value => value.trim()).filter(Boolean).forEach((segment, index) => {
    const match = segment.match(/^(\d{1,2})(?::\d{2})?\s*([AaPp][Mm])?\s*[-–]\s*(\d{1,2})(?::\d{2})?\s*([AaPp][Mm])?\s*(.*)$/);
    if (!match) return;
    const start = Math.max(0, Math.min(23, scheduleHourTo24(match[1], match[2], false)));
    const end = Math.max(1, Math.min(24, scheduleHourTo24(match[3], match[4], true)));
    if (end > start) windows.push({ start, end, name: (match[5] || ('Window ' + (index + 1))).trim() });
  });
  return windows;
}

function nextMedicationId(name, existingId) {
  const base = safeMedicationId(name, 'medication');
  if (existingId) return existingId;
  const ids = new Set(state.meds.map(med => med.id));
  if (!ids.has(base)) return base;
  let suffix = 2;
  while (ids.has(base + '-' + suffix)) suffix += 1;
  return base + '-' + suffix;
}

function saveMedicationEditor() {
  if (!state.medEditor) return;
  const editor = state.medEditor;
  const form = editor.form;
  const name = String(form.name || '').trim();
  if (!name) { setToast('Enter a medication name before saving.'); return; }
  const type = form.type === 'win' ? 'win' : 'gap';
  const gapH = Math.max(0, Number(form.gapH) || 0);
  const windows = type === 'win' ? parseScheduleWindows(form.windowsText) : [];
  if (type === 'win' && !windows.length) { setToast('Add at least one schedule window, for example 8 AM-12 PM Morning.'); return; }
  const dailyLimit = Number(form.dailyLimit) || 0;
  const original = editor.sourceId ? state.meds.find(med => med.id === editor.sourceId) : null;
  const id = nextMedicationId(name, editor.sourceId);
  const candidate = {
    ...(original || {}),
    id,
    name,
    sub: String(form.sub || '').trim(),
    note: String(form.note || '').trim(),
    type,
    gapH,
    doses: parseDoseOptions(form.dosesText),
    windows,
    quickLog: !!form.quickLog,
    groupedEvening: !!form.groupedEvening,
    groupedMorning: !!form.groupedMorning,
    chemoOnly: !!form.chemoOnly,
    ceiling: dailyLimit > 0,
    ceilingMax: dailyLimit || undefined,
    ceilingUnit: form.dailyLimitUnit === 'mg' ? undefined : form.dailyLimitUnit
  };
  if (!candidate.doses.length) delete candidate.doses;
  if (type !== 'win') delete candidate.windows;
  if (!candidate.ceiling) { delete candidate.ceilingMax; delete candidate.ceilingUnit; }
  const saved = normalizeMedication(candidate, state.meds.length);
  const meds = editor.sourceId ? state.meds.map(med => med.id === editor.sourceId ? saved : med) : [...state.meds, saved];
  persistMedicationConfig(meds, state.archivedMeds);
  setState({ meds, medEditor: null, confirmDeleteMed: null });
  setToast(saved.name + (editor.mode === 'add' ? ' added to medication management.' : ' updated.'));
  tourEvent('med:saved');
}

// Meds that render as their own standalone Quick Log card on Home (not folded into the Morning
// meds / Evening meds grouped card). This is exactly the population the Home Quick Log grid at
// state.meds.filter(m => m.quickLog && ...) draws from and renders in state.meds array order, so
// reordering this subset is what actually changes the order those cards appear on Home.
function reorderableHomeMeds() {
  return state.meds.filter(med => med.quickLog && !med.groupedMorning && !med.groupedEvening);
}

// Swaps two meds' positions directly within state.meds (by id), leaving every other medication's
// position untouched — including any grouped/managed-only meds that happen to sit between them in
// the raw array. dir is -1 (move up/earlier) or +1 (move down/later), relative to the reorderable
// subset's current order, not raw array index.
function moveReorderableMed(id, dir) {
  const list = reorderableHomeMeds();
  const idx = list.findIndex(med => med.id === id);
  const swapIdx = idx + dir;
  if (idx < 0 || swapIdx < 0 || swapIdx >= list.length) return;
  const aId = list[idx].id, bId = list[swapIdx].id;
  const meds = state.meds.slice();
  const aPos = meds.findIndex(med => med.id === aId);
  const bPos = meds.findIndex(med => med.id === bId);
  const tmp = meds[aPos];
  meds[aPos] = meds[bPos];
  meds[bPos] = tmp;
  persistMedicationConfig(meds, state.archivedMeds);
  setState({ meds });
}

function deleteMedicationConfig(id) {
  const med = state.meds.find(item => item.id === id);
  if (!med) return;
  if (state.confirmDeleteMed !== id) { setState({ confirmDeleteMed: id }); return; }
  const meds = state.meds.filter(item => item.id !== id);
  const archivedMeds = { ...(state.archivedMeds || {}), [id]: { name: med.name, sub: med.sub || '' } };
  persistMedicationConfig(meds, archivedMeds);
  setState({ meds, archivedMeds, confirmDeleteMed: null, medEditor: state.medEditor && state.medEditor.sourceId === id ? null : state.medEditor });
  setToast(med.name + ' was removed from the active list. Existing dose history was preserved.');
}

function renderHistory(now) {
  const d0 = dayStart(now);
  const yStart = d0 - 86400000;
  const dmap = {};
  state.entries.forEach(e => { if (e.medId === 'inpatient' || e.medId === 'inpatient_start' || e.medId === 'inpatient_end' || e.medId === 'cycle_start' || e.medId === 'cycle_end') return; const k = dayStart(e.ts); (dmap[k] = dmap[k] || []).push(e); });

  const allHistoryDays = Object.keys(dmap).map(k => +k).sort((a, b) => b - a).map(k => {
    const missed = missedDosesFor(k, now);
    const items = [...dmap[k], ...missed].sort((a, b) => a.ts - b.ts);
    const tyDay = items.filter(e => e.medId === 'tylenol' && !e.missed).reduce((s, e) => s + (e.mg || 0), 0);
    const doses = items.filter(e => e.medId !== 'temp' && e.medId !== 'weight' && e.medId !== 'cycle_start' && e.medId !== 'cycle_end' && !e.missed && !e.skipped).length;
    const temps = items.filter(e => e.medId === 'temp').length;
    const weights = items.filter(e => e.medId === 'weight').length;
    const wkday = new Date(k).toLocaleDateString([], { weekday: 'long' });
    const md = (new Date(k).getMonth() + 1) + '/' + new Date(k).getDate();
    const label = k === d0 ? ('Today - ' + wkday + ' ' + md) : (wkday + ', ' + md);
    let summary = doses + ' dose' + (doses === 1 ? '' : 's');
    if (temps) summary += ' · ' + temps + ' temp' + (temps === 1 ? '' : 's');
    if (weights) summary += ' · ' + weights + ' wt';
    if (tyDay) summary += ' · ' + tyDay.toLocaleString() + ' mg APAP';
    const imoDay = items.filter(e => e.medId === 'imodium' && !e.missed).reduce((s, e) => s + (e.pills || 0), 0);
    if (imoDay) summary += ' · ' + imoDay + ' Imodium';
    if (missed.length) summary += ' · ' + missed.length + ' MISSED';
    return { key: k, label, summary, items, missedCount: missed.length };
  });

  // v70: "Missed Doses" / "Show all" toggle, driven by clicking a missed-dose banner elsewhere
  // (Today's banner or the pinned previous-days header card both set historyMissedOnly via
  // goToHistoryTop()) or by tapping the toggle directly here. Filtered mode keeps each day's
  // original summary line (for context -- "3 doses · 1 MISSED") but only lists the missed rows
  // underneath, and drops any day with zero misses entirely.
  const totalMissed = allHistoryDays.reduce((s, d) => s + d.missedCount, 0);
  const missedOnly = !!state.historyMissedOnly;
  const historyDays = missedOnly
    ? allHistoryDays.map(d => ({ ...d, items: d.items.filter(e => e.missed) })).filter(d => d.items.length > 0)
    : allHistoryDays;

  const toggleBar = h('div', { style: { display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: '10px', flexWrap: 'wrap' } },
    h('div', { style: { display: 'inline-flex', background: 'rgba(212,104,138,0.10)', borderRadius: '11px', padding: '3px', gap: '2px' } },
      h('button', { onClick: () => setState({ historyMissedOnly: true }), style: { minHeight: '34px', padding: '0 13px', borderRadius: '9px', background: missedOnly ? '#C0453B' : 'transparent', color: missedOnly ? '#fff' : '#7D6974', fontSize: '12.5px', fontWeight: '800' } }, 'Missed Doses' + (totalMissed ? ' (' + totalMissed + ')' : '')),
      h('button', { onClick: () => setState({ historyMissedOnly: false }), style: { minHeight: '34px', padding: '0 13px', borderRadius: '9px', background: !missedOnly ? '#AA5375' : 'transparent', color: !missedOnly ? '#fff' : '#7D6974', fontSize: '12.5px', fontWeight: '800' } }, 'Show all')
    ),
    missedOnly && totalMissed ? h('button', { onClick: () => clearAllMissedInHistory(now), style: { minHeight: '34px', padding: '0 14px', borderRadius: '9px', background: 'rgba(192,69,59,0.14)', border: '1px solid rgba(192,69,59,0.4)', color: '#A13830', fontSize: '12.5px', fontWeight: '800' } }, 'Clear all') : null
  );

  if (historyDays.length === 0) {
    const emptyMsg = missedOnly ? 'No missed doses to review — you\'re all caught up!' : 'No history yet.';
    return [toggleBar, h('div', { style: { background: 'rgba(255,255,255,0.4)', backdropFilter: 'blur(12px)', WebkitBackdropFilter: 'blur(12px)', border: '1px dashed rgba(212,104,138,0.2)', borderRadius: '16px', padding: '30px', textAlign: 'center', color: '#7D6974', fontSize: '14px', lineHeight: '1.5' } }, emptyMsg)];
  }

  return [toggleBar, h('div', { style: { display: 'flex', flexDirection: 'column', gap: '16px' } },
    ...historyDays.map(d => h('div', null,
      h('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', gap: '10px', marginBottom: '8px', flexWrap: 'wrap' } },
        h('div', { style: { display: 'flex', alignItems: 'center', gap: '8px', flexWrap: 'wrap' } },
          h('div', { style: { fontSize: '13px', fontWeight: '800', letterSpacing: '0.03em', textTransform: 'uppercase', color: '#8A6479' } }, d.label),
          isInpatientDay(d.key) ? h('span', { style: { display: 'inline-flex', alignItems: 'center', gap: '4px', background: '#9A6419', color: '#fff', borderRadius: '99px', padding: '2px 9px', fontSize: '10px', fontWeight: '800', letterSpacing: '0.05em', textTransform: 'uppercase' } }, appIcon('hospital', 11), 'In-Patient') : null
        ),
        h('div', { className: 'mono', style: { fontSize: '12px', color: d.summary.includes('MISSED') ? '#C0453B' : '#7D6974', fontWeight: d.summary.includes('MISSED') ? '700' : '400' } }, d.summary)
      ),
      h('div', { style: { background: 'rgba(255,255,255,0.55)', backdropFilter: 'blur(16px)', WebkitBackdropFilter: 'blur(16px)', border: '1px solid rgba(212,104,138,0.12)', borderRadius: '16px', overflow: 'hidden', boxShadow: '0 4px 24px rgba(180,130,150,0.10), 0 1px 2px rgba(180,130,150,0.06), inset 0 1px 0 rgba(255,255,255,0.7)' } },
        ...(() => {
          const rows = [];
          d.items.forEach((e, i) => {

            if (newGroup) {

            }
            if (e.missed) { rows.push(missedRow(e, newGroup ? 0 : 1)); return; }
            rows.push(h('div', { style: { display: 'flex', alignItems: 'center', gap: '12px', padding: '12px 14px', borderTop: newGroup ? 'none' : '1px solid rgba(212,104,138,0.08)' } },

              h('div', { style: { flex: '1' } },

                  e.skipped ? h('span', { style: { fontSize: '10.5px', fontWeight: '700', letterSpacing: '0.04em', textTransform: 'uppercase', color: '#7D6974', background: 'rgba(125,105,116,0.14)', border: '1px solid rgba(125,105,116,0.3)', borderRadius: '6px', padding: '1px 6px' } }, 'Skipped') : null
                ),
                e.skipped ? h('div', { style: { fontSize: '12.5px', color: '#7D6974', fontStyle: 'italic' } }, 'Marked as not given') : e.dose ? h('div', { style: { fontSize: '12.5px', color: '#8A6479' } }, e.dose + (e.painLevel ? (' · Pain ' + e.painLevel + '/10') : '')) : (e.painLevel ? h('div', { style: { fontSize: '12.5px', color: '#8A6479' } }, 'Pain ' + e.painLevel + '/10') : null)
              ),
              removeBtn(e)
            ));
          });
          return rows;
        })()
      )
    ))
  )];
}

function renderWeightTrend(now) {
  const weightEntries = state.entries.filter(e => e.medId === 'weight' && e.weight).sort((a, b) => a.ts - b.ts);
  const range = state.weightRange;
  const DAY = 86400000;

  // Range toggle
  const toggle = h('div', { style: { display: 'flex', gap: '5px', background: 'rgba(255,255,255,0.45)', borderRadius: '10px', padding: '3px', border: '1px solid rgba(212,104,138,0.12)', alignSelf: 'flex-start' } },
    h('button', { onClick: () => setState({ weightRange: 'weeks' }), style: { padding: '8px 18px', borderRadius: '8px', fontSize: '13px', fontWeight: '700', background: range === 'weeks' ? '#9B5B8A' : 'transparent', color: range === 'weeks' ? '#fff' : '#7D6974' } }, 'Weeks'),
    h('button', { onClick: () => setState({ weightRange: 'months' }), style: { padding: '8px 18px', borderRadius: '8px', fontSize: '13px', fontWeight: '700', background: range === 'months' ? '#9B5B8A' : 'transparent', color: range === 'months' ? '#fff' : '#7D6974' } }, 'Months')
  );

  if (weightEntries.length === 0) {
    return [
      toggle,
      h('div', { style: { background: 'rgba(255,255,255,0.03)', border: '1px dashed rgba(255,255,255,0.1)', borderRadius: '16px', padding: '40px', textAlign: 'center', color: '#7D6974', fontSize: '14px', lineHeight: '1.5' } }, 'No weight readings logged yet.\nLog your first weight on the Today tab.')
    ];
  }

  // Determine time range
  const spanDays = range === 'weeks' ? 28 : 90;
  const minTs = now - spanDays * DAY;
  const filtered = weightEntries.filter(e => e.ts >= minTs);
  const points = filtered.length > 0 ? filtered : weightEntries.slice(-2);

  if (points.length === 0) {
    return [toggle, h('div', { style: { color: '#7D6974', fontSize: '14px', textAlign: 'center', padding: '40px' } }, 'No data in this range.')];
  }

  // Calculate bounds
  const weights = points.map(p => p.weight);
  const allWeights = weightEntries.map(p => p.weight);
  const minW = Math.floor(Math.min(...weights) - 2);
  const maxW = Math.ceil(Math.max(...weights) + 2);
  const wRange = maxW - minW || 4;
  const tMin = points[0].ts;
  const tMax = Math.max(points[points.length - 1].ts, tMin + DAY);
  const tRange = tMax - tMin || DAY;

  // SVG dimensions
  const W = 680, H = 300;
  const pad = { top: 30, right: 20, bottom: 50, left: 55 };
  const cW = W - pad.left - pad.right;
  const cH = H - pad.top - pad.bottom;

  const x = (ts) => pad.left + ((ts - tMin) / tRange) * cW;
  const y = (w) => pad.top + cH - ((w - minW) / wRange) * cH;

  // Build SVG path
  let pathD = '';
  let areaD = '';
  const dots = [];
  points.forEach((p, i) => {
    const px = x(p.ts), py = y(p.weight);
    pathD += (i === 0 ? 'M' : 'L') + px.toFixed(1) + ',' + py.toFixed(1);
    if (i === 0) areaD = 'M' + px.toFixed(1) + ',' + (pad.top + cH);
    areaD += 'L' + px.toFixed(1) + ',' + py.toFixed(1);
    dots.push({ x: px, y: py, w: p.weight, ts: p.ts });
  });
  areaD += 'L' + x(points[points.length - 1].ts).toFixed(1) + ',' + (pad.top + cH) + 'Z';

  // Y-axis labels (weight)
  const ySteps = 5;
  const yLabels = [];
  for (let i = 0; i <= ySteps; i++) {
    const val = minW + (wRange / ySteps) * i;
    yLabels.push({ val: Math.round(val * 10) / 10, py: y(val) });
  }

  // X-axis labels (dates)
  const xLabels = [];
  const labelCount = range === 'weeks' ? 4 : 6;
  for (let i = 0; i <= labelCount; i++) {
    const ts = tMin + (tRange / labelCount) * i;
    const d = new Date(ts);
    const label = (d.getMonth() + 1) + '/' + d.getDate();
    xLabels.push({ label, px: x(ts) });
  }

  // Stats
  const latest = points[points.length - 1];
  const first = points[0];
  const change = latest.weight - first.weight;
  const changeLabel = (change >= 0 ? '+' : '') + change.toFixed(1) + ' lbs';
  const changeColor = Math.abs(change) < 0.5 ? '#8A6479' : change > 0 ? '#9A6419' : '#AA5375';
  const avg = (weights.reduce((s, w) => s + w, 0) / weights.length).toFixed(1);

  // Build SVG as string
  let svg = '<svg viewBox="0 0 ' + W + ' ' + H + '" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:auto;">';
  // Grid lines
  yLabels.forEach(yl => {
    svg += '<line x1="' + pad.left + '" y1="' + yl.py.toFixed(1) + '" x2="' + (W - pad.right) + '" y2="' + yl.py.toFixed(1) + '" stroke="rgba(212,104,138,0.10)" stroke-width="1"/>';
    svg += '<text x="' + (pad.left - 10) + '" y="' + (yl.py + 4).toFixed(1) + '" fill="#7D6974" font-size="11" font-family="IBM Plex Mono,monospace" text-anchor="end">' + yl.val + '</text>';
  });
  // X labels
  xLabels.forEach(xl => {
    svg += '<text x="' + xl.px.toFixed(1) + '" y="' + (H - 10) + '" fill="#7D6974" font-size="11" font-family="IBM Plex Mono,monospace" text-anchor="middle">' + xl.label + '</text>';
  });
  // Area gradient
  svg += '<defs><linearGradient id="wg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="rgba(155,91,138,0.25)"/><stop offset="100%" stop-color="rgba(155,91,138,0)"/></linearGradient></defs>';
  svg += '<path d="' + areaD + '" fill="url(#wg)"/>';
  // Line
  svg += '<path d="' + pathD + '" fill="none" stroke="#9B5B8A" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>';
  // Dots
  dots.forEach((d, i) => {
    const isLast = i === dots.length - 1;
    svg += '<circle cx="' + d.x.toFixed(1) + '" cy="' + d.y.toFixed(1) + '" r="' + (isLast ? 5 : 3.5) + '" fill="' + (isLast ? '#9B5B8A' : '#7B3F6B') + '" stroke="' + (isLast ? '#AA5375' : '#9B5B8A') + '" stroke-width="' + (isLast ? 2 : 1.5) + '"/>';
    // Value label on last dot
    if (isLast) {
      svg += '<text x="' + d.x.toFixed(1) + '" y="' + (d.y - 12).toFixed(1) + '" fill="#7B3F6B" font-size="13" font-weight="700" font-family="IBM Plex Mono,monospace" text-anchor="middle">' + d.w + '</text>';
    }
  });
  svg += '</svg>';

  // Chart card
  const chart = h('section', { style: { background: 'rgba(255,255,255,0.55)', backdropFilter: 'blur(16px)', WebkitBackdropFilter: 'blur(16px)', border: '1px solid rgba(212,104,138,0.12)', borderRadius: '18px', padding: '20px 16px 12px', boxShadow: '0 4px 24px rgba(180,130,150,0.10), 0 1px 2px rgba(180,130,150,0.06), inset 0 1px 0 rgba(255,255,255,0.7)' } },
    h('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: '16px' } },
      h('div', null,
        h('div', { style: { fontSize: '11.5px', fontWeight: '700', letterSpacing: '0.05em', textTransform: 'uppercase', color: '#8A6479' } }, 'Weight Trend'),
        h('div', { style: { fontSize: '12.5px', color: '#7D6974', marginTop: '3px' } }, range === 'weeks' ? 'Last 4 weeks' : 'Last 3 months')
      ),
      h('div', { className: 'mono', style: { fontSize: '24px', fontWeight: '700', color: '#7B3F6B', letterSpacing: '-0.02em' } }, latest.weight + ' lbs')
    ),
    h('div', { innerHTML: svg })
  );

  // Stats row
  const stats = h('div', { style: { display: 'grid', gridTemplateColumns: 'repeat(3,1fr)', gap: '10px' } },
    h('div', { style: { background: 'rgba(255,255,255,0.55)', backdropFilter: 'blur(16px)', WebkitBackdropFilter: 'blur(16px)', border: '1px solid rgba(212,104,138,0.12)', borderRadius: '14px', padding: '14px', textAlign: 'center', boxShadow: '0 4px 24px rgba(180,130,150,0.10), inset 0 1px 0 rgba(255,255,255,0.7)' } },
      h('div', { style: { fontSize: '11px', fontWeight: '700', letterSpacing: '0.05em', textTransform: 'uppercase', color: '#7D6974', marginBottom: '6px' } }, 'Current'),
      h('div', { className: 'mono', style: { fontSize: '18px', fontWeight: '700', color: '#3D2B3A' } }, latest.weight + '')
    ),
    h('div', { style: { background: 'rgba(255,255,255,0.55)', backdropFilter: 'blur(16px)', WebkitBackdropFilter: 'blur(16px)', border: '1px solid rgba(212,104,138,0.12)', borderRadius: '14px', padding: '14px', textAlign: 'center', boxShadow: '0 4px 24px rgba(180,130,150,0.10), inset 0 1px 0 rgba(255,255,255,0.7)' } },
      h('div', { style: { fontSize: '11px', fontWeight: '700', letterSpacing: '0.05em', textTransform: 'uppercase', color: '#7D6974', marginBottom: '6px' } }, 'Average'),
      h('div', { className: 'mono', style: { fontSize: '18px', fontWeight: '700', color: '#3D2B3A' } }, avg)
    ),
    h('div', { style: { background: 'rgba(255,255,255,0.55)', backdropFilter: 'blur(16px)', WebkitBackdropFilter: 'blur(16px)', border: '1px solid rgba(212,104,138,0.12)', borderRadius: '14px', padding: '14px', textAlign: 'center', boxShadow: '0 4px 24px rgba(180,130,150,0.10), inset 0 1px 0 rgba(255,255,255,0.7)' } },
      h('div', { style: { fontSize: '11px', fontWeight: '700', letterSpacing: '0.05em', textTransform: 'uppercase', color: '#7D6974', marginBottom: '6px' } }, 'Change'),
      h('div', { className: 'mono', style: { fontSize: '18px', fontWeight: '700', color: changeColor } }, changeLabel)
    )
  );

  // Readings list
  const readingsItems = points.slice().reverse().map((p, i) => {
    const d = new Date(p.ts);
    const day = d.toLocaleDateString([], { weekday: 'short', month: 'numeric', day: 'numeric' });
    const time = fmtTime(p.ts);
    return h('div', { style: { display: 'flex', alignItems: 'center', gap: '12px', padding: '11px 14px', borderTop: i > 0 ? '1px solid rgba(212,104,138,0.08)' : 'none' } },
      h('div', { style: { flex: '1' } },
        h('div', { style: { fontSize: '14px', fontWeight: '700' } }, day),
        h('div', { style: { fontSize: '12px', color: '#7D6974' } }, time)
      ),
      h('div', { className: 'mono', style: { fontSize: '16px', fontWeight: '600', color: '#7B3F6B' } }, p.weight + ' lbs')
    );
  });

  const readings = h('section', null,
    h('div', { style: { fontSize: '13px', fontWeight: '800', letterSpacing: '0.04em', textTransform: 'uppercase', color: '#8A6479', marginBottom: '10px' } }, 'All Readings'),
    h('div', { style: { background: 'rgba(255,255,255,0.55)', backdropFilter: 'blur(16px)', WebkitBackdropFilter: 'blur(16px)', border: '1px solid rgba(212,104,138,0.12)', borderRadius: '16px', overflow: 'hidden', boxShadow: '0 4px 24px rgba(180,130,150,0.10), inset 0 1px 0 rgba(255,255,255,0.7)' } },
      ...readingsItems
    )
  );

  return [toggle, chart, stats, readings];
}


// --------- Notification System ---------
let notifSentToday = {};  // key: 'scheduled-8pm' or 'avail-tylenol-{ts}', value: true

function resetNotifTracking() {
  const today = dayStart(Date.now());
  if (notifSentToday._day !== today) {
    notifSentToday = { _day: today };
  }
}

function requestNotifPermission() {
  if ('Notification' in window && Notification.permission === 'default') {
    Notification.requestPermission();
  }
}

function sendNotif(title, body, tag) {
  if (!('Notification' in window) || Notification.permission !== 'granted') return;
  try {
    new Notification(title, { body, icon: 'icon-192.png', tag, requireInteraction: false });
  } catch(e) {
    // Fallback for mobile: use service worker registration
    if ('serviceWorker' in navigator && navigator.serviceWorker.controller) {
      navigator.serviceWorker.ready.then(reg => {
        reg.showNotification(title, { body, icon: 'icon-192.png', tag, requireInteraction: false });
      }).catch(() => {});
    }
  }
}

function checkNotifications() {
  if (TEST_MODE) return; // no local reminders from the test app
  if (!('Notification' in window) || Notification.permission !== 'granted') return;
  if (!state.loaded || state.entries.length === 0 && !state.demo) return;

  resetNotifTracking();
  const now = new Date();
  const h = now.getHours();
  const m = now.getMinutes();
  const nowTs = now.getTime();

  // Quiet hours: no notifications between 10 PM (22) and 8 AM (8)
  if (h >= 22 || h < 8) return;

  // --- SCHEDULED REMINDERS ---

  // 8:00 PM reminder (20:00) - evening meds
  // Fire between 8:00 PM and 8:05 PM
  if (h === 20 && m < 5 && !notifSentToday['sched-8pm']) {
    const eveningMeds = ['protonix', 'iron', 'compazine'];
    const due = [];
    const d0 = dayStart(nowTs);
    eveningMeds.forEach(medId => {
      const med = state.meds.find(x => x.id === medId);
      if (!med) return;
      // Check if already taken in the evening window today
      if (med.type === 'win') {
        const eveningWin = med.windows.find(w => w.start >= 17);
        if (eveningWin) {
          const ws = d0 + eveningWin.start * 3600000;
          const we = d0 + eveningWin.end * 3600000;
          const taken = state.entries.some(e => e.medId === medId && e.ts >= ws && e.ts < we);
          if (!taken) due.push(med.name);
        } else {
          // Anytime window (iron) - check if taken today at all
          const taken = state.entries.some(e => e.medId === medId && e.ts >= d0);
          if (!taken) due.push(med.name);
        }
      } else if (med.type === 'gap') {
        // Compazine is gap-based but reminder at 8pm
        const st = status(med);
        if (!st.locked) due.push(med.name);
      }
    });
    if (due.length > 0) {
      sendNotif('Evening Meds Due', due.join(', ') + ' — time for evening doses', 'evening-8pm');
    }
    notifSentToday['sched-8pm'] = true;
  }

  // 8:30 AM reminder (8:30) - morning meds
  // Fire between 8:30 AM and 8:35 AM
  if (h === 8 && m >= 30 && m < 35 && !notifSentToday['sched-830am']) {
    const morningMeds = [];
    const d0 = dayStart(nowTs);
    // Protonix morning window
    const protonix = state.meds.find(x => x.id === 'protonix');
    if (protonix) {
      const mornWin = protonix.windows.find(w => w.start < 12);
      if (mornWin) {
        const ws = d0 + mornWin.start * 3600000;
        const we = d0 + mornWin.end * 3600000;
        const taken = state.entries.some(e => e.medId === 'protonix' && e.ts >= ws && e.ts < we);
        if (!taken) morningMeds.push('Protonix');
      }
    }
    if (morningMeds.length > 0) {
      sendNotif('Morning Meds Due', morningMeds.join(', ') + ' — time for morning doses', 'morning-830am');
    }
    notifSentToday['sched-830am'] = true;
  }

  // 10:00 AM reminder (9:55-10:05) - Buspirone/Paroxetine (default window; if Protonix's actual
  // morning dose logs later, morningWindowsFor() shifts these to 2h after that instead, and
  // status().locked reflects that shift automatically — no separate dynamic check needed here
  // since this fixed slot already lines up with the 10 AM default).
  if ((h === 9 && m >= 55) || (h === 10 && m <= 5)) {
    if (!notifSentToday['sched-10am']) {
      const due = [];
      ['buspirone', 'paroxetine'].forEach(medId => {
        const med = state.meds.find(x => x.id === medId);
        if (!med) return;
        const st = status(med);
        if (!st.locked) due.push(med.name);
      });
      if (due.length > 0) {
        sendNotif('Morning Meds Due', due.join(', ') + ' — time for morning doses', 'morning-10am');
      }
      notifSentToday['sched-10am'] = true;
    }
  }

  // --- GAP-BASED REMINDERS (fire when med becomes available) ---
  const gapMeds = []; // Zofran is as-needed now — no gap-based availability reminder
  gapMeds.forEach(medId => {
    const med = state.meds.find(x => x.id === medId);
    if (!med) return;
    const st = status(med);

    // Only notify when med just became available (was locked, now open)
    if (st.locked) return;

    // Check daily ceiling - don't notify if ceiling hit
    if (st.ceilingHit) return;

    // For Zofran: the 8:30 AM reminder already covers morning.
    // Only send gap-based for later-in-day availability.
    const last = latest(medId);
    if (!last) return; // No previous dose, don't spam

    // Create a unique key based on the dose timestamp so we only notify once per availability window
    const notifKey = 'avail-' + medId + '-' + last.ts;
    if (notifSentToday[notifKey]) return;

    // Only notify if the gap JUST expired (within the last 2 minutes)
    // This prevents firing on every render cycle
    if (med.type === 'gap' && med.gapH > 0) {
      const gapEnd = last.ts + med.gapH * 3600000;
      const sinceFree = nowTs - gapEnd;
      if (sinceFree >= 0 && sinceFree < 120000) {
        sendNotif(med.name + ' Available', med.name + ' gap timer is up — ready to dose', 'avail-' + medId);
        notifSentToday[notifKey] = true;
      }
    }
  });
}

// Request push notification permission and subscribe to FCM
subscribePush();

// Init
if (!getPrefsDB().installedAt) { setPrefsDB({ installedAt: Date.now() }); }
unsubPrefs = subscribePrefs((prefs) => {
  if (prefs.installedAt) MISSED_TRACK_SINCE = prefs.installedAt;
  CONFIG.patientName = (prefs.patientName || '').trim();
  setState({ missedClearedAt: prefs.missedClearedAt || 0, dismissedMisses: prefs.dismissedMisses || [], patientName: CONFIG.patientName, prefsLoaded: true });
});
unsub = subscribeEntries((entries) => {
  const wasEmpty = state.entries.length === 0 && !state.loaded;
  if (state.timeModal) {
    // Defer update so the modal isn't destroyed mid-interaction
    pendingEntries = entries;
    if (!state.loaded) { state.loaded = true; state.entries = entries; }
    return;
  }
  setState({ entries, loaded: true });
  // If first load and no entries, offer to seed demo data
  if (false && wasEmpty && entries.length === 0) {
    seedDemo();
  }
});

setInterval(() => {
  state.now = simNow();
  const activeTag = document.activeElement && document.activeElement.tagName;
  const isEditing = activeTag === 'INPUT' || activeTag === 'SELECT' || activeTag === 'TEXTAREA';
  if (!state.timeModal && !isEditing) render();
  checkNotifications();
}, 1000);
if (!getPrefsDB().tourDone && (getPrefsDB().patientName || '').trim()) { state.tourStep = 0; }
render();

// Service worker registration
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').then(reg => {
    // Proactively check for a newer sw.js on every load instead of relying solely on the
    // browser's own background update check, which can be slow/throttled and left this
    // testing app running stale cached JS (with already-pushed bug fixes not applying) for
    // multiple page loads during the 30-use-case QA pass — found while verifying UC11.
    reg.update().catch(() => {});
  }).catch(() => {});

  // Once a new service worker activates and takes control, reload once so this tab picks up
  // the new app shell immediately rather than continuing to run the JS it started with.
  let swRefreshing = false;
  navigator.serviceWorker.addEventListener('controllerchange', () => {
    if (swRefreshing) return;
    swRefreshing = true;
    window.location.reload();
  });
}
</script>
